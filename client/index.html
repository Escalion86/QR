<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>QR Generator</h1>
      <p class="hint">Выбери тип и введи данные в одном поле.</p>

      <form id="qr-form" class="form">
        <label>
          Type
          <select id="type">
            <option value="url" selected>url</option>
            <option value="text">text</option>
            <option value="email">email</option>
            <option value="phone">phone</option>
            <option value="sms">sms</option>
            <option value="wifi">wifi</option>
            <option value="vcard">vcard</option>
            <option value="geo">geo</option>
            <option value="event">event</option>
            <option value="whatsapp">whatsapp</option>
          </select>
        </label>

        <label>
          Data
          <textarea id="data-input" rows="5">https://example.com</textarea>
        </label>

        <p id="format-help" class="help"></p>

        <section class="options">
          <h2>Настройки QR</h2>

          <label>
            Размер (пресет)
            <select id="resolution-preset">
              <option value="low">low (256)</option>
              <option value="medium">medium (512)</option>
              <option value="high" selected>high (1024)</option>
              <option value="ultra">ultra (2048)</option>
            </select>
          </label>

          <label>
            Уровень коррекции
            <select id="error-level">
              <option value="L">L</option>
              <option value="M" selected>M</option>
              <option value="Q">Q</option>
              <option value="H">H</option>
            </select>
          </label>

          <label>
            Отступ (0-20)
            <input id="margin" type="number" min="0" max="20" value="2" />
          </label>

          <label>
            Цвет кода
            <input id="color-dark" type="color" value="#111111" />
          </label>

          <label>
            Цвет фона
            <input id="color-light" type="color" value="#ffffff" />
          </label>

          <label>
            Логотип URL (опционально)
            <input id="logo-url" type="url" placeholder="https://example.com/logo.png" />
          </label>

          <label>
            Логотип файл (опционально)
            <input id="logo-file" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>

          <label>
            Размер логотипа (0.1-0.35)
            <input id="logo-size-ratio" type="number" min="0.1" max="0.35" step="0.01" value="0.2" />
          </label>

          <label>
            Отступ логотипа (0-40)
            <input id="logo-padding" type="number" min="0" max="40" value="8" />
          </label>

          <label>
            Цвет подложки логотипа
            <input id="logo-bg-color" type="color" value="#ffffff" />
          </label>
        </section>

        <button type="submit">Generate QR</button>
      </form>

      <p id="status" class="status"></p>

      <section id="result" class="result hidden">
        <h2>Result</h2>
        <img id="qr-image" alt="Generated QR" />
        <a id="download-link" download="qr.png">Download PNG</a>
      </section>
    </main>

    <script src="/client-config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>QR Generator</h1>
      <p class="hint">Выбери тип и введи данные в одном поле.</p>

      <form id="qr-form" class="form">
        <label>
          Type
          <select id="type">
            <option value="url" selected>url</option>
            <option value="text">text</option>
            <option value="email">email</option>
            <option value="phone">phone</option>
            <option value="sms">sms</option>
            <option value="wifi">wifi</option>
            <option value="vcard">vcard</option>
            <option value="geo">geo</option>
            <option value="event">event</option>
            <option value="whatsapp">whatsapp</option>
          </select>
        </label>

        <label>
          Data
          <textarea id="data-input" rows="5">https://example.com</textarea>
        </label>

        <p id="format-help" class="help"></p>

        <button type="submit">Generate QR</button>
      </form>

      <p id="status" class="status"></p>

      <section id="result" class="result hidden">
        <h2>Result</h2>
        <img id="qr-image" alt="Generated QR" />
        <a id="download-link" download="qr.png">Download PNG</a>
      </section>
    </main>

    <script src="/client-config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
